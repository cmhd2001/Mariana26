<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Galería de Momentos</title>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="stylesheet" href="./carousel.css">
    <style> @import url('https://fonts.googleapis.com/css2?family=Limelight&display=swap'); </style>
</head>
<body class="is-loading">
    
    <script>
        window.addEventListener('load', () => {
            document.body.classList.remove('is-loading');
        });
    </script>
    
    <div class="content-wrapper">
        
        <h1 style="font-family: 'Limelight', cursive; text-align: center; color: #F8EBFE; font-size: 55px; margin-top: 20px;">Galería de Momentos 🌟</h1>

        <div class="carousel-container-wrapper">
            
            <button class="custom-carousel-btn" type="button" id="prevBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>

            <div id="customMomentsCarousel" class="carousel-view">
                <div class="carousel-track">

                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1t1-XrGapNKQg6aVFP9rqSNEHBasgJIp7/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>              

                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <img src="../images/16.png" alt="Mariana y Ana comiendo asquerositos">
                        </div>
                    </div>
                    
                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1oIb1rQ8UBVKsOmzhSiz-_aAK8V_aGh0X/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>

                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <img src="../images/13.JPG" alt="Mariana surfista">
                        </div>
                    </div>
                    
                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <img src="../images/8.jpeg" alt="Mariana y Carmen Secret Santa">
                        </div>
                    </div>

                    <div class="carousel-slide-item">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1ZJ1wVvkNLC_l5wqLK_90QdVGG_mYRRo7/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>

                </div>
            </div>

            <button class="custom-carousel-btn" type="button" id="nextBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
            
        </div>

        <button id="back-to-gallery"> Revive tus felicitaciones </button>

        <script>
            const carouselTrack = document.querySelector('.carousel-track');
            const carouselView = document.querySelector('.carousel-view');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const backButton = document.getElementById('back-to-gallery');

            // 1. Clonación dinámica para crear el bucle infinito sin picar código de más
            const originalItems = Array.from(carouselTrack.children);
            
            // Clonamos los ítems al final e inicio para crear la ilusión de infinito
            originalItems.forEach(item => {
                let cloneAfter = item.cloneNode(true);
                carouselTrack.appendChild(cloneAfter);
            });
            originalItems.reverse().forEach(item => {
                let cloneBefore = item.cloneNode(true);
                carouselTrack.insertBefore(cloneBefore, carouselTrack.firstChild);
            });

            // 2. Posicionamiento Inicial (Saltamos los clones del principio)
            const gap = 25; 
            const itemWidth = originalItems[0].offsetWidth + gap;
            const initialOffset = itemWidth * originalItems.length;
            
            carouselView.scrollLeft = initialOffset;

            // Activamos scroll suave solo después de posicionarlo
            setTimeout(() => {
                carouselView.classList.add('smooth-scroll');
            }, 50);

            // 3. Control de los Botones (Avanzar / Retroceder de uno en uno)
            nextBtn.addEventListener('click', () => {
                carouselView.scrollLeft += itemWidth;
            });

            prevBtn.addEventListener('click', () => {
                carouselView.scrollLeft -= itemWidth;
            });

            // 4. Reset del Bucle Infinito Invisible
            carouselView.addEventListener('scroll', () => {
                const currentScroll = carouselView.scrollLeft;
                const maxScroll = carouselTrack.scrollWidth - carouselView.clientWidth;

                // Si se desplaza demasiado a la derecha (hacia los clones del final)
                if (currentScroll >= maxScroll - 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
                
                // Si se desplaza demasiado a la izquierda (hacia los clones del principio)
                if (currentScroll <= 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = maxScroll - initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
            });

            // Transición de salida
            backButton.addEventListener('click', () => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "../gallery/gallery2.html"; 
                }, 1000);
            });
        </script>
    </div>
</body>
</html>

            setTimeout(() => {

            }, 1000);
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.5/swiper-bundle.min.js"></script>

    <script>
        const swiper = new Swiper('.swiper', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 1, 
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 100,
                modifier: 2.5,
                slideShadows: false
            },
            direction: 'horizontal',
            loop: true,

            pagination: {
                el: '.swiper-pagination',
                clickable: true
            },
            navigation: {
                nextEl: '#swiperNextBtn',
                prevEl: '#swiperPrevBtn'
            },
            keyboard: {
                enabled: true
            },

            mousewheel: {
                thresholdDelta: 70
            },

            breakpoints: {
                560: {
                    slidesPerView: 1.5
                },
                768: {
                    slidesPerView: 2
                },
                1024: {
                    slidesPerView: 3
                }
            }
        });

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Galería de Momentos</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <link rel="stylesheet" href="./moments.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.5/swiper-bundle.min.css" />
    <style> @import url('https://fonts.googleapis.com/css2?family=Limelight&display=swap'); </style>
</head>
<body class="is-loading">

    <div class="page-loader">
        <div class="svg-loader-container">
            <svg viewBox="0 0 100 150">
                <g>
                    <path d="M 50,100 A 1,1 0 0 1 50,0"/>
                </g>
                <g>
                    <path d="M 50,75 A 1,1 0 0 0 50,-25"/>
                </g>
                <defs>
                    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#e3a812; stop-opacity:1" />
                        <stop offset="25%" style="stop-color:#ffd86e; stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#F7E194; stop-opacity:1" />
                        <stop offset="75%" style="stop-color:#ffd86e; stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#EDB21D; stop-opacity:1" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
    </div>    
    
    <script>
        window.addEventListener('load', () => {
            document.body.classList.remove('is-loading');
        });
    </script>
    
    <div class="content-wrapper">
        
        <h1 style="color: #F8EBFE; font-size: 45px"> Galería de Momentos 🌟</h1>

        <section class="swiper-container">
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1URwTdFll6g1K3EZnJbaC8zKCk4-IecYY/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/16.png" alt="Mariana y Ana comiendo asquerositos">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1Tu_i7RpoD4bnbwKd00FkkVaFbEJ33HzP/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/13.JPG" alt="Mariana surfista">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1v3bwVOLYm28wuX_X5PdW77dtIBV_w02Q/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>                    
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/8.jpeg" alt="Mariana y Carmen Secret Santa">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1TEEdaHhWHrRqqUlFo4dHrnElQqN6ygXJ/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/14.jpeg" alt="Mariana y Andy">
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1Y0oxAq4fvm57_5OH5R0rIBBICwRBmtng/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/17.png" alt="Mariana cocinera">
                        </div>
                    </div>                    
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <iframe src="https://drive.google.com/file/d/1c89sd_2pL4KFHdNm2z01sCbPLJ2I-q6-/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                        </div>
                    </div>
                    <div class="swiper-slide">
                        <div class="carousel-media-box">
                            <img src="./images/20.jpeg" alt="Mariana y Rector">
                        </div>
                    </div>
                </div>

                <div class="swiper-pagination"></div>
                
                <button class="custom-carousel-btn" type="button" id="swiperPrevBtn" aria-label="Anterior">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button class="custom-carousel-btn" type="button" id="swiperNextBtn" aria-label="Siguiente">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </section>

        <button id="back-to-gallery"> Revive tus felicitaciones ❤️ </button>

    </div>

    <script>        
        const backButton = document.getElementById('back-to-gallery');
        
        backButton.addEventListener('click', () => {
            document.body.classList.add('fade-out');
            setTimeout(() => {
                window.location.href = "./sorpresa.html"; 
            }, 1000);
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.5/swiper-bundle.min.js"></script>

    <script>
        const swiper = new Swiper('.swiper', {
            effect: 'coverflow',
            grabCursor: true,
            centeredSlides: true,
            slidesPerView: 1, 
            coverflowEffect: {
                rotate: 0,
                stretch: 0,
                depth: 100,
                modifier: 2.5,
                slideShadows: false
            },
            direction: 'horizontal',
            loop: true,

            pagination: {
                el: '.swiper-pagination',
                clickable: true
            },
            navigation: {
                nextEl: '#swiperNextBtn',
                prevEl: '#swiperPrevBtn'
            },
            keyboard: {
                enabled: true
            },

            mousewheel: {
                thresholdDelta: 70
            },

            breakpoints: {
                560: {
                    slidesPerView: 1.5
                },
                768: {
                    slidesPerView: 2
                },
                1024: {
                    slidesPerView: 3
                }
            }
        });
    </script>
</body>
</html>

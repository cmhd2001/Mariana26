        <button id="go-to-moments"> Y aún hay más... </button>         

        <script>
            const carouselTrack = document.querySelector('.carousel-track');
            const carouselView = document.querySelector('.carousel-view');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const goButton = document.getElementById('go-to-moments');

            // 1. Clonación dinámica para crear el bucle infinito sin picar código de más
            const originalItems = Array.from(carouselTrack.children);
            
            // Clonamos los ítems al final e inicio para crear la ilusión de infinito
            originalItems.forEach(item => {
                let cloneAfter = item.cloneNode(true);
                carouselTrack.appendChild(cloneAfter);
            });
            originalItems.reverse().forEach(item => {
                let cloneBefore = item.cloneNode(true);
                carouselTrack.insertBefore(cloneBefore, carouselTrack.firstChild);
            });

            // 2. Posicionamiento Inicial (Saltamos los clones del principio)
            const gap = 25; 
            const itemWidth = originalItems[0].offsetWidth + gap;
            const initialOffset = itemWidth * originalItems.length;
            
            carouselView.scrollLeft = initialOffset;

            // Activamos scroll suave solo después de posicionarlo
            setTimeout(() => {
                carouselView.classList.add('smooth-scroll');
            }, 50);

            // 3. Control de los Botones (Avanzar / Retroceder de uno en uno)
            nextBtn.addEventListener('click', () => {
                carouselView.scrollLeft += itemWidth;
            });

            prevBtn.addEventListener('click', () => {
                carouselView.scrollLeft -= itemWidth;
            });

            // 4. Reset del Bucle Infinito Invisible
            carouselView.addEventListener('scroll', () => {
                const currentScroll = carouselView.scrollLeft;
                const maxScroll = carouselTrack.scrollWidth - carouselView.clientWidth;

                // Si se desplaza demasiado a la derecha (hacia los clones del final)
                if (currentScroll >= maxScroll - 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
                
                // Si se desplaza demasiado a la izquierda (hacia los clones del principio)
                if (currentScroll <= 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = maxScroll - initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
            });

            // Transición de salida
            goButton.addEventListener('click', () => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "./moments.html"; 
                }, 1000);
            });
        </script>
        
        <script>// 1. Seleccionamos TODAS las tarjetas de la página mediante su clase (.flip-card)
            const allCards = document.querySelectorAll('.flip-card');

            // 2. Recorremos cada tarjeta una por una
            allCards.forEach((card) => {
                
                // 3. Buscamos el "inner" y el "botón" EXCLUSIVAMENTE dentro de ESTA tarjeta actual
                const cardInner = card.querySelector('.flip-card-inner');
                const backButton = card.querySelector('.back-flip-btn');

                // Evento para voltear al frente (Clic en la tarjeta)
                card.addEventListener('click', (e) => {
                    if (!cardInner.classList.contains('is-flipped')) {
                        cardInner.classList.add('is-flipped');
                    }
                });

                // Evento para regresar (Clic en el botón de la flecha trasera)
                backButton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita activar el clic de la tarjeta padre por accidente
                    cardInner.classList.remove('is-flipped');
                });
            });
        </script>

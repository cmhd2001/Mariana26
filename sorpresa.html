        <button id="go-to-moments"> Y aún hay más... </button>         

        <script>
            const carouselTrack = document.querySelector('.carousel-track');
            const carouselView = document.querySelector('.carousel-view');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const goButton = document.getElementById('go-to-moments');

            // 1. Clonación dinámica para crear el bucle infinito sin picar código de más
            const originalItems = Array.from(carouselTrack.children);
            
            // Clonamos los ítems al final e inicio para crear la ilusión de infinito
            originalItems.forEach(item => {
                let cloneAfter = item.cloneNode(true);
                carouselTrack.appendChild(cloneAfter);
            });
            originalItems.reverse().forEach(item => {
                let cloneBefore = item.cloneNode(true);
                carouselTrack.insertBefore(cloneBefore, carouselTrack.firstChild);
            });

            // 2. Posicionamiento Inicial (Saltamos los clones del principio)
            const gap = 25; 
            const itemWidth = originalItems[0].offsetWidth + gap;
            const initialOffset = itemWidth * originalItems.length;
            
            carouselView.scrollLeft = initialOffset;

            // Activamos scroll suave solo después de posicionarlo
            setTimeout(() => {
                carouselView.classList.add('smooth-scroll');
            }, 50);

            // 3. Control de los Botones (Avanzar / Retroceder de uno en uno)
            nextBtn.addEventListener('click', () => {
                carouselView.scrollLeft += itemWidth;
            });

            prevBtn.addEventListener('click', () => {
                carouselView.scrollLeft -= itemWidth;
            });

            document.addEventListener('keydown', (event) => {
                // Si el usuario presiona la flecha derecha
                if (event.key === 'ArrowRight') {
                    nextBtn.click(); // Simula un clic en el botón derecho
                }
                // Si el usuario presiona la flecha izquierda
                else if (event.key === 'ArrowLeft') {
                    prevBtn.click(); // Simula un clic en el botón izquierdo
                }
            });

            // 4. Reset del Bucle Infinito Invisible
            carouselView.addEventListener('scroll', () => {
                const currentScroll = carouselView.scrollLeft;
                const maxScroll = carouselTrack.scrollWidth - carouselView.clientWidth;

                // Si se desplaza demasiado a la derecha (hacia los clones del final)
                if (currentScroll >= maxScroll - 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
                
                // Si se desplaza demasiado a la izquierda (hacia los clones del principio)
                if (currentScroll <= 5) {
                    carouselView.classList.remove('smooth-scroll');
                    carouselView.scrollLeft = maxScroll - initialOffset;
                    carouselView.offsetHeight; // Forzar reflow
                    carouselView.classList.add('smooth-scroll');
                }
            });

            let isDown = false;
            let startX;
            let scrollLeftStart;
            let wasDragging = false; // Evita que la tarjeta se voltee si solo se estaba arrastrando

            // 1. SCROLL CON LA RUEDA DEL MOUSE (Rueda vertical -> Desplazamiento horizontal)
            carouselView.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    carouselView.classList.remove('smooth-scroll'); // Movimiento instantáneo responsivo
                    carouselView.scrollLeft += e.deltaY * 0.8; // Ajusta el 0.8 si quieres más o menos sensibilidad
                    
                    // Restauramos el comportamiento de scroll suave para los botones al detener la rueda
                    clearTimeout(carouselView.wheelTimeout);
                    carouselView.wheelTimeout = setTimeout(() => {
                        carouselView.classList.add('smooth-scroll');
                    }, 150);
                }
            }, { passive: false });

            // 2. CLICK Y ARRASTRAR CON EL MOUSE (Para simular swipe en Computadoras)
            carouselView.addEventListener('mousedown', (e) => {
                isDown = true;
                wasDragging = false;
                carouselView.classList.remove('smooth-scroll'); // Desactivamos transiciones durante el arrastre dinámico
                startX = e.pageX - carouselView.offsetLeft;
                scrollLeftStart = carouselView.scrollLeft;
            });

            carouselView.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                const x = e.pageX - carouselView.offsetLeft;
                const walk = (x - startX) * 1.5; // Multiplicador de velocidad de arrastre
                
                if (Math.abs(x - startX) > 5) {
                    wasDragging = true; // Si el mouse se movió más de 5px, el usuario está arrastrando, no haciendo click
                }
                
                e.preventDefault();
                carouselView.scrollLeft = scrollLeftStart - walk;
            });

            const stopDragging = () => {
                isDown = false;
                // Devolvemos el scroll suave de forma segura tras soltar el mouse
                setTimeout(() => {
                    carouselView.classList.add('smooth-scroll');
                }, 50);
            };

            carouselView.addEventListener('mouseup', stopDragging);
            carouselView.addEventListener('mouseleave', stopDragging);

            // 3. SOLUCIÓN DE CONFLICTO: Evita voltear la tarjeta por error al terminar un arrastre
            carouselView.addEventListener('click', (e) => {
                if (wasDragging) {
                    e.stopPropagation();
                    e.preventDefault();
                }
            }, true); // Usamos 'true' (fase de captura) para interceptar el click antes de que llegue a la tarjeta

            // 4. MEJORA EN MÓVILES: Desactivar scroll suave durante el Touch nativo para que sea fluido
            carouselView.addEventListener('touchstart', () => {
                carouselView.classList.remove('smooth-scroll');
            }, { passive: true });

            carouselView.addEventListener('touchend', () => {
                setTimeout(() => {
                    carouselView.classList.add('smooth-scroll');
                }, 150);
            }, { passive: true });

            // Transición de salida
            goButton.addEventListener('click', () => {
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = "./moments.html"; 
                }, 1000);
            });
        </script>
        
        <script>// 1. Seleccionamos TODAS las tarjetas de la página mediante su clase (.flip-card)
            const allCards = document.querySelectorAll('.flip-card');

            // 2. Recorremos cada tarjeta una por una
            allCards.forEach((card) => {
                
                // 3. Buscamos el "inner" y el "botón" EXCLUSIVAMENTE dentro de ESTA tarjeta actual
                const cardInner = card.querySelector('.flip-card-inner');
                const backButton = card.querySelector('.back-flip-btn');

                // Evento para voltear al frente (Clic en la tarjeta)
                card.addEventListener('click', (e) => {
                    if (!cardInner.classList.contains('is-flipped')) {
                        cardInner.classList.add('is-flipped');
                    }
                });

                // Evento para regresar (Clic en el botón de la flecha trasera)
                backButton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita activar el clic de la tarjeta padre por accidente
                    cardInner.classList.remove('is-flipped');
                });
            });
        </script>

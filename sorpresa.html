<script>
            const carouselTrack = document.querySelector('.carousel-track');
            const carouselView = document.querySelector('.carousel-view');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const goButton = document.getElementById('go-to-moments');

            const items = Array.from(carouselTrack.children);
            const N = items.length;
            let currentIndex = 0;

            // SOLUCIÓN MATEMÁTICA: Centrado perfecto basado en la posición real del elemento
            function goTo(index, animate = true) {
                currentIndex = ((index % N) + N) % N;
                
                if (!animate) carouselView.classList.remove('smooth-scroll');
                
                const targetItem = items[currentIndex];
                // Calcula el scroll exacto para que el centro de la tarjeta quede en el centro de la pantalla
                const centerPosition = targetItem.offsetLeft - (carouselView.clientWidth / 2) + (targetItem.offsetWidth / 2);
                
                carouselView.scrollLeft = centerPosition;
                
                if (!animate) {
                    carouselView.offsetHeight; // Forzar asimilación gráfica
                    carouselView.classList.add('smooth-scroll');
                }
            }

            // Inicializar centrado rápido al cargar
            goTo(0, false);
            // Reajustar si el usuario voltea el celular o cambia el tamaño de la ventana
            window.addEventListener('resize', () => goTo(currentIndex, false));

            nextBtn.addEventListener('click', () => goTo(currentIndex + 1));
            prevBtn.addEventListener('click', () => goTo(currentIndex - 1));

            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight') goTo(currentIndex + 1);
                else if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
            });

            carouselView.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    goTo(e.deltaY > 0 ? currentIndex + 1 : currentIndex - 1);
                }
            }, { passive: false });

            let isDown = false, startX, scrollLeftStart, wasDragging = false;

            carouselView.addEventListener('mousedown', (e) => {
                isDown = true;
                wasDragging = false;
                carouselView.classList.remove('smooth-scroll');
                startX = e.pageX - carouselView.offsetLeft;
                scrollLeftStart = carouselView.scrollLeft;
            });

            carouselView.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                const x = e.pageX - carouselView.offsetLeft;
                const walk = (x - startX) * 1.5;
                if (Math.abs(x - startX) > 5) wasDragging = true;
                e.preventDefault();
                carouselView.scrollLeft = scrollLeftStart - walk;
            });

            // Función para atrapar la tarjeta más cercana tras soltar el ratón o el dedo
            const snapToClosest = () => {
                let closestIndex = 0;
                let minDistance = Infinity;
                const viewCenter = carouselView.scrollLeft + (carouselView.clientWidth / 2);
                
                items.forEach((item, index) => {
                    const itemCenter = item.offsetLeft + (item.offsetWidth / 2);
                    const distance = Math.abs(viewCenter - itemCenter);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestIndex = index;
                    }
                });
                goTo(closestIndex);
            };

            const stopDragging = () => {
                if (!isDown) return;
                isDown = false;
                snapToClosest();
            };

            carouselView.addEventListener('mouseup', stopDragging);
            carouselView.addEventListener('mouseleave', stopDragging);

            carouselView.addEventListener('click', (e) => {
                if (wasDragging) {
                    e.stopPropagation();
                    e.preventDefault();
                }
            }, true);

            carouselView.addEventListener('touchstart', () => {
                carouselView.classList.remove('smooth-scroll');
            }, { passive: true });

            carouselView.addEventListener('touchend', () => {
                snapToClosest();
            }, { passive: true });

            goButton.addEventListener('click', () => {
                document.body.classList.add('fade-out');
                setTimeout(() => { window.location.href = "./moments.html"; }, 1000);
            });
        </script>
        
<script>
            // 1. Seleccionamos TODAS las tarjetas de la página mediante su clase (.flip-card)
            const allCards = document.querySelectorAll('.flip-card');

            // 2. Recorremos cada tarjeta una por una
            allCards.forEach((card, index) => {
                
                // 3. Buscamos el "inner" y el "botón" EXCLUSIVAMENTE dentro de ESTA tarjeta actual
                const cardInner = card.querySelector('.flip-card-inner');
                const backButton = card.querySelector('.back-flip-btn');

                // Evento para voltear al frente (Clic en la tarjeta)
                card.addEventListener('click', (e) => {
                    e.preventDefault(); // Bloquea los saltos nativos del navegador por el iframe
                    
                    if (!cardInner.classList.contains('is-flipped')) {
                        cardInner.classList.add('is-flipped');
                        
                        // MAGIA: Al hacer clic, forzamos que el script centre suavemente 
                        // esta tarjeta, anulando el salto brusco de foco del navegador.
                        goTo(index); 
                    }
                });

                // Evento para regresar (Clic en el botón de la flecha trasera)
                backButton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita activar el clic de la tarjeta padre por accidente
                    e.preventDefault();
                    cardInner.classList.remove('is-flipped');
                });
            });
        </script>

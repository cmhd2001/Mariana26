<!DOCTYPE html>

    <body>
            
        <h1 style="font-family: 'Limelight', cursive; font-size: 50px;">¡Feliz Cumpleaños 26, Mariana!</h1>

        <div class="flip-card" id="birthdayCard">
            <div class="flip-card-inner">
                
                <div class="flip-card-front">
                <img src="../images/2.jfif" alt="Portada de la tarjeta">
                <div class="front-text">Haz clic para ver tu sorpresa 🎁</div>
                </div>
                
                <div class="flip-card-back">
                <iframe src="https://drive.google.com/file/d/TU_ID_DE_VIDEO/preview" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                
                <button class="back-flip-btn"><img src="../images/return.png" alt="Return"></button>
                </div>

            </div>
        </div>

        <script>
            const card = document.getElementById('birthdayCard');
            const cardInner = card.querySelector('.flip-card-inner');
            const backButton = card.querySelector('.back-flip-btn');

            // Evento 1: Al hacer clic en la tarjeta (principalmente afectará a la cara frontal)
            card.addEventListener('click', (e) => {
                // Si la tarjeta NO está volteada, la volteamos al hacer clic
                if (!cardInner.classList.contains('is-flipped')) {
                    cardInner.classList.add('is-flipped');
                }
            });

            // Evento 2: Al hacer clic en el botón de regresar de la cara trasera
            backButton.addEventListener('click', (e) => {
                // e.stopPropagation() evita que el clic se "propague" al contenedor padre por accidente
                e.stopPropagation(); 
                
                // Quitamos la clase para regresar a la cara frontal
                cardInner.classList.remove('is-flipped');
            });
        </script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/8.4.5/swiper-bundle.min.js"></script>


        <script>
            const swiper = new Swiper('.swiper', {
                effect: 'coverflow',
                grabCursor: true,
                centeredSlides: true,
                slidesPerView: 1, 
                coverflowEffect: {
                    rotate: 0,
                    stretch: 0,
                    depth: 100,
                    modifier: 2.5,
                    slideShadows: false
                },
                direction: 'horizontal',
                loop: true,

                pagination: {
                    el: '.swiper-pagination',
                    clickable: true
                },
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev'
                },
                keyboard: {
                    enabled: true
                },

                mousewheel: {
                    thresholdDelta: 70
                },

                breakpoints: {
                    560: {
                        slidesPerView: 1.5
                    },
                    768: {
                        slidesPerView: 2
                    },
                    1024: {
                        slidesPerView: 3
                    }
                }
            });
        </script>

        <script>// 1. Seleccionamos TODAS las tarjetas de la página mediante su clase (.flip-card)
            const allCards = document.querySelectorAll('.flip-card');

            // 2. Recorremos cada tarjeta una por una
            allCards.forEach((card) => {
                
                // 3. Buscamos el "inner" y el "botón" EXCLUSIVAMENTE dentro de ESTA tarjeta actual
                const cardInner = card.querySelector('.flip-card-inner');
                const backButton = card.querySelector('.back-flip-btn');

                // Evento para voltear al frente (Clic en la tarjeta)
                card.addEventListener('click', (e) => {
                    if (!cardInner.classList.contains('is-flipped')) {
                        cardInner.classList.add('is-flipped');
                    }
                });

                // Evento para regresar (Clic en el botón de la flecha trasera)
                backButton.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita activar el clic de la tarjeta padre por accidente
                    cardInner.classList.remove('is-flipped');
                });
            });
        </script>
